name: POAM Scan

on:
  push:
    branches: [main]
  schedule:
    - cron: '0 8 * * 1'   # Every Monday at 8am UTC
  workflow_dispatch:

jobs:
  poam-generate:
    name: Generate POAM Report
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -e .

      - name: Run POAM demo
        run: poam demo

      - name: Upload POAM report artifact
        uses: actions/upload-artifact@v4
        with:
          name: poam-report
          path: poam_output.csv
          retention-days: 30

  poam-validate:
    name: Validate Sample Findings
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -e .

      - name: Validate sample findings
        run: poam validate -i examples/sample_findings.json
